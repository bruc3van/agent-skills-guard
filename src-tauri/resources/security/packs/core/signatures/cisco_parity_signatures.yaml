# === cisco_parity_signatures.yaml — Cisco skill_scanner 对齐补充包 ===
#
# 定位：与 Cisco AI Defense skill_scanner 关键确定性检测能力对齐的补充规则包。
#       不是所有新规则的默认落点，仅用于保持 parity 参考。
#
# 适合放入：
#   - 为保持与 Cisco reference 能力对齐而引入的规则
#   - 本项目 core 尚未覆盖、但 Cisco 中已有明确检测价值的规则
#   - 需要保留 source_ref 方便后续追踪的规则
#   - 对 parity fixture 有直接支撑的规则
#
# 维护原则：
#   - 不作为所有新规则的默认落点
#   - 每条规则应带 metadata.origin: cisco_parity 与 metadata.source_ref
#   - 经过产品化调优后可迁移到 core，迁移时更新 fixture 与变更说明
#   - 保持少而准，优先补能力缺口，而不是扩大成第二个 core
#
# SPDX-License-Identifier: Apache-2.0 (patterns adapted from reference/skill_scanner)

name: cisco_parity
version: "1.0"
description: Signatures aligned with Cisco core pack (reference/skill_scanner)

rules:
- id: PATH_TRAVERSAL_OPEN
  category: CmdInjection
  severity: Critical
  weight: 90
  confidence: High
  hard_trigger: true
  file_types:
  - .py
  patterns:
  - os\.path\.join\s*\([^)]+,\s*\w+\s*\).*\n.*open\s*\(
  - path\s*=\s*f["'][^"']*\{[^}]+\}[^"']*["']\s*\n.*open\s*\(path
  - open\s*\(\s*f["']/[^"']*\{[^}]+\}
  - return\s+open\s*\(\s*path\s*\)
  exclude_patterns:
  - \.json["']
  - \.yaml["']
  - \.yml["']
  - \.txt["']
  - test_
  - _test\.
  description: 路径遍历 - 用户可控的文件路径
  remediation: 使用 realpath 验证路径并设置目录白名单
  cwe_id: CWE-22

  metadata:
    origin: cisco_parity
    source_ref: reference/skill_scanner/data/packs/core/python/path_traversal
    fp_risk: low
    phase: P0
- id: SQL_INJECTION_STRING_FORMAT
  category: CmdInjection
  severity: Critical
  weight: 90
  confidence: High
  hard_trigger: true
  file_types:
  - .py
  patterns:
  - 'f["'']SELECT.*WHERE.*\{[^}]+\}'
  - 'f["''].*LIKE.*\{[^}]+\}'
  - '["'']SELECT.*FROM.*["'']\s*\+\s*\w+'
  exclude_patterns:
  - '%s'
  - \?
  - LIMIT\s+\{
  - ^\s*#
  - example
  description: SQL 查询中使用了字符串插值变量
  remediation: 使用参数化查询
  cwe_id: CWE-89

  metadata:
    origin: cisco_parity
    source_ref: reference/skill_scanner/data/packs/core/python/sql_injection
    fp_risk: low
    phase: P0
- id: COMMAND_INJECTION_USER_INPUT
  category: CmdInjection
  severity: High
  weight: 70
  confidence: High
  hard_trigger: false
  file_types:
  - .sh
  - .bash
  patterns:
  - eval\s+["']?\$[0-9@*]
  - eval\s+["']?\$\{[0-9@*]
  exclude_patterns:
  - example
  - test
  - '#.*eval'
  description: eval 使用了用户可控的 Shell 输入
  remediation: 避免对用户输入使用 eval
  cwe_id: CWE-78

  metadata:
    origin: cisco_parity
    source_ref: reference/skill_scanner/data/packs/core/bash/eval_user_input
    fp_risk: low
    phase: P0
- id: COMMAND_INJECTION_JS_FUNCTION_CONSTRUCTOR
  category: CmdInjection
  severity: Critical
  weight: 85
  confidence: High
  hard_trigger: true
  file_types:
  - .js
  - .ts
  - .mjs
  - .cjs
  patterns:
  - new\s+Function\s*\(
  - '(?:^|[^.])Function\s*\(\s*[''"]'
  - \bsetTimeout\s*\(\s*['"]
  - \bsetInterval\s*\(\s*['"]
  exclude_patterns:
  - (?i)never\s+use\s+Function
  description: 通过 Function 构造器或字符串定时器执行动态代码
  remediation: 使用函数引用代替字符串代码执行
  cwe_id: CWE-94

  metadata:
    origin: cisco_parity
    source_ref: reference/skill_scanner/data/packs/core/javascript/function_constructor
    fp_risk: low
    phase: P0
- id: SVG_EMBEDDED_SCRIPT
  category: CmdInjection
  severity: Critical
  weight: 85
  confidence: High
  hard_trigger: true
  file_types:
  - .svg
  patterns:
  - '<script[^>]*>[^<]*</script>'
  - '\bon\w+\s*=\s*["''][^"'']*["'']'
  - 'javascript\s*:'
  description: SVG 中包含可执行脚本或事件处理器
  remediation: 移除 SVG 资源中的脚本和事件处理器
  cwe_id: CWE-79

  metadata:
    origin: cisco_parity
    source_ref: reference/skill_scanner/data/packs/core/assets/svg_script
    fp_risk: low
    phase: P0
- id: PDF_EMBEDDED_JAVASCRIPT
  category: CmdInjection
  severity: Critical
  weight: 85
  confidence: High
  hard_trigger: true
  file_types:
  - .pdf
  patterns:
  - /JS\s*\(
  - /JavaScript\s
  - /OpenAction\s
  - /AA\s*<<
  - /Launch\s
  description: PDF 中包含嵌入式 JavaScript 或自动执行动作
  remediation: 移除 PDF 资源中的 JavaScript
  cwe_id: CWE-79

  metadata:
    origin: cisco_parity
    source_ref: reference/skill_scanner/data/packs/core/assets/pdf_javascript
    fp_risk: low
    phase: P0
- id: GLOB_HIDDEN_FILE_TARGETING
  category: SensitiveFileAccess
  severity: Medium
  weight: 25
  confidence: Medium
  hard_trigger: false
  file_types:
  - .sh
  - .bash
  - .py
  - .md
  patterns:
  - glob\s*\([^)]*\.\*
  - find\s+[^|]*\s+-name\s+["']?\.\*
  - for\s+\w+\s+in\s+\.\*\s*;
  description: 模式匹配目标包含隐藏文件
  remediation: 避免广泛匹配隐藏文件
  cwe_id: CWE-200

  metadata:
    origin: cisco_parity
    source_ref: reference/skill_scanner/data/packs/core/bash/hidden_file_glob
    fp_risk: medium
    phase: P0
- id: FIND_EXEC_PATTERN
  category: CmdInjection
  severity: High
  weight: 65
  confidence: High
  hard_trigger: false
  file_types:
  - .sh
  - .bash
  - .md
  patterns:
  - 'find\s+[^|;]*-exec\s+(?:bash|sh|zsh|python[23]?|perl|ruby|node|curl|wget|rm|chmod|chown|eval)'
  - find\s+[^|;]*\|\s*xargs\s+(?:bash|sh|zsh|eval|exec)
  description: find -exec 或 find | xargs 执行链
  remediation: 避免对不受信任的目录树使用 find -exec
  cwe_id: CWE-78

  metadata:
    origin: cisco_parity
    source_ref: reference/skill_scanner/data/packs/core/bash/find_exec
    fp_risk: low
    phase: P0
- id: SECRET_STRIPE_KEY
  category: Secrets
  severity: Critical
  weight: 90
  confidence: High
  hard_trigger: true
  file_types:
  - .py
  - .sh
  - .md
  - .js
  - .ts
  patterns:
  - (?:sk|pk)_(?:live|test)_[A-Za-z0-9]{24,}
  - (?:sk|pk)_(?:live|test)_["']\s*\+\s*["'][A-Za-z0-9]{24,}
  description: 检测到 Stripe API 密钥
  remediation: 使用环境变量存储 Stripe 密钥
  cwe_id: CWE-798

  metadata:
    origin: cisco_parity
    source_ref: reference/skill_scanner/data/packs/core/secrets/stripe_key
    fp_risk: low
    phase: P0
- id: SECRET_GOOGLE_API
  category: Secrets
  severity: Critical
  weight: 90
  confidence: High
  hard_trigger: true
  file_types:
  - .py
  - .sh
  - .md
  - .js
  - .ts
  patterns:
  - AIza[A-Za-z0-9_-]{35}
  description: 检测到 Google API 密钥
  remediation: 使用环境变量存储 Google API 密钥
  cwe_id: CWE-798

  metadata:
    origin: cisco_parity
    source_ref: reference/skill_scanner/data/packs/core/secrets/google_api
    fp_risk: low
    phase: P0
- id: DATA_EXFIL_SOCKET_CONNECT
  category: Network
  severity: Critical
  weight: 80
  confidence: High
  hard_trigger: true
  file_types:
  - .py
  patterns:
  - socket\.socket\s*\([^)]*\)\.connect
  - socket\.create_connection
  exclude_patterns:
  - localhost
  - 127\.0\.0\.1
  - 0\.0\.0\.0
  - ::1
  description: Socket 连接到外部主机
  remediation: 记录并限制 Socket 连接使用
  cwe_id: CWE-200

  metadata:
    origin: cisco_parity
    source_ref: reference/skill_scanner/data/packs/core/python/socket_connect
    fp_risk: low
    phase: P0
- id: DATA_EXFIL_JS_NETWORK
  category: Network
  severity: Medium
  weight: 30
  confidence: Medium
  hard_trigger: false
  file_types:
  - .js
  - .ts
  patterns:
  - \bfetch\s*\(
  - \baxios\.(?:get|post|put|delete|patch|request)\s*\(
  exclude_patterns:
  - (?i)example
  - (?i)mock
  - (?i)test
  - (?i)developers\.openai\.com
  description: JavaScript/TypeScript 中的出站网络请求
  remediation: 记录网络请求依赖，确认目标地址可信
  cwe_id: CWE-200

  metadata:
    origin: cisco_parity
    source_ref: reference/skill_scanner/data/packs/core/javascript/network_exfil
    fp_risk: medium
    phase: P0
- id: DATA_EXFIL_JS_FS_ACCESS
  category: SensitiveFileAccess
  severity: High
  weight: 55
  confidence: High
  hard_trigger: false
  file_types:
  - .js
  - .ts
  patterns:
  - fs\.(?:readFile|readFileSync|createReadStream)\s*\(
  - fs\.(?:writeFile|writeFileSync|createWriteStream)\s*\(
  exclude_patterns:
  - (?i)example
  - (?i)mock
  description: Node.js 文件系统读写操作
  remediation: 限制文件系统访问至必要路径
  cwe_id: CWE-200

  metadata:
    origin: cisco_parity
    source_ref: reference/skill_scanner/data/packs/core/javascript/fs_access
    fp_risk: low
    phase: P0
- id: DATA_EXFIL_BASE64_AND_NETWORK
  category: Network
  severity: High
  weight: 60
  confidence: High
  hard_trigger: false
  file_types:
  - .py
  patterns:
  - base64\.(?:b64encode|encodebytes)[^\n]{0,160}(?:requests\.|urllib\.request|httpx\.|socket\.)
  - (?:requests\.|urllib\.request|httpx\.|socket\.)[^\n]{0,160}base64\.(?:b64encode|encodebytes)
  description: Base64 编码结合网络发送
  remediation: 审查编码后发送的数据流
  cwe_id: CWE-200

  metadata:
    origin: cisco_parity
    source_ref: reference/skill_scanner/data/packs/core/python/base64_network
    fp_risk: low
    phase: P0
- id: OBFUSCATION_HEX_BLOB
  category: Obfuscation
  severity: Medium
  weight: 35
  confidence: Medium
  hard_trigger: false
  patterns:
  - (?:0x[0-9a-fA-F]{2}\s*){32,}
  description: 大型十六进制数据块（疑似代码混淆）
  remediation: 避免使用大型内联十六进制数据
  cwe_id: CWE-656

  metadata:
    origin: cisco_parity
    source_ref: reference/skill_scanner/data/packs/core/obfuscation/hex_blob
    fp_risk: medium
    phase: P0
- id: OBFUSCATION_XOR_ENCODING
  category: Obfuscation
  severity: Medium
  weight: 35
  confidence: Medium
  hard_trigger: false
  file_types:
  - .py
  patterns:
  - chr\s*\(\s*ord\s*\([^)]+\)\s*\^
  description: XOR 风格的字符编码循环
  remediation: 使用标准编码库代替 XOR 循环
  cwe_id: CWE-656

  metadata:
    origin: cisco_parity
    source_ref: reference/skill_scanner/data/packs/core/obfuscation/xor_encoding
    fp_risk: medium
    phase: P0
- id: RESOURCE_ABUSE_INFINITE_LOOP
  category: Obfuscation
  severity: Medium
  weight: 20
  confidence: Medium
  hard_trigger: false
  file_types:
  - .py
  patterns:
  - 'while\s+True\s*:'
  - 'while\s+1\s*:'
  description: 潜在的无限循环
  remediation: 添加退出条件或超时机制
  cwe_id: CWE-400

  metadata:
    origin: cisco_parity
    source_ref: reference/skill_scanner/data/packs/core/python/infinite_loop
    fp_risk: medium
    phase: P0
- id: RESOURCE_ABUSE_FORK_BOMB
  category: Destructive
  severity: High
  weight: 75
  confidence: High
  hard_trigger: true
  file_types:
  - .sh
  - .bash
  patterns:
  - ':\(\)\s*\{\s*:\|\:&\s*\}\s*;\s*:'
  description: 检测到 Fork 炸弹模式
  remediation: 移除 Fork 炸弹命令
  cwe_id: CWE-400

  metadata:
    origin: cisco_parity
    source_ref: reference/skill_scanner/data/packs/core/bash/fork_bomb
    fp_risk: low
    phase: P0
- id: SOCIAL_ENG_ANTHROPIC_IMPERSONATION
  category: SocialEngineering
  severity: Medium
  weight: 40
  confidence: Medium
  hard_trigger: false
  file_types:
  - .md
  patterns:
  - (?i)official\s+anthropic
  - (?i)anthropic\s+official
  - (?i)created\s+by\s+anthropic\s+team
  description: 描述中疑似冒充 Anthropic 官方
  remediation: 不要冒充 Anthropic 或使用官方品牌标识
  cwe_id: CWE-451

  metadata:
    origin: cisco_parity
    source_ref: reference/skill_scanner/data/packs/core/social/anthropic_impersonation
    fp_risk: medium
    phase: P0
- id: TOOL_ABUSE_SYSTEM_PACKAGE_INSTALL
  category: PolicyViolation
  severity: High
  weight: 60
  confidence: High
  hard_trigger: false
  file_types:
  - .sh
  - .bash
  - .py
  - .md
  patterns:
  - (?i)\b(?:apt-get|apt|yum|dnf|brew)\s+install\b
  - (?i)\bpip\s+install\b
  - (?i)\bnpm\s+install\s+-g\b
  exclude_patterns:
  - (?i)\buv\s+pip\s+install\b
  - (?i)`[^`]*pip\s+install[^`]*`
  - (?i)install it with
  description: 系统级或全局包安装操作
  remediation: 避免在 skill 脚本中安装系统包
  cwe_id: CWE-494

  metadata:
    origin: cisco_parity
    source_ref: reference/skill_scanner/data/packs/core/bash/package_install
    fp_risk: low
    phase: P0
- id: TOOL_ABUSE_UNTRUSTED_PACKAGE_SOURCE
  category: PolicyViolation
  severity: High
  weight: 65
  confidence: High
  hard_trigger: false
  file_types:
  - .sh
  - .py
  patterns:
  - pip\s+install\s+git\+https?://
  - pip\s+install\s+.*--index-url\s+https?://
  description: 从不受信任的远程源安装包
  remediation: 将依赖固定到受信任的包索引源
  cwe_id: CWE-494

  metadata:
    origin: cisco_parity
    source_ref: reference/skill_scanner/data/packs/core/python/untrusted_source
    fp_risk: low
    phase: P0
- id: HIDDEN_FILE_WITH_CODE
  category: PolicyViolation
  severity: High
  weight: 70
  confidence: High
  hard_trigger: false
  file_types:
  - .py
  - .sh
  patterns:
  - os\.system\s*\(
  - subprocess\.(?:run|call|Popen)
  description: 隐藏路径脚本包含代码执行操作
  remediation: 不要将可执行脚本隐藏为点文件
  cwe_id: CWE-494

  metadata:
    origin: cisco_parity
    source_ref: reference/skill_scanner/data/packs/core/bash/hidden_file_exec
    fp_risk: low
    phase: P0
- id: RESOURCE_ABUSE_LARGE_ALLOCATION
  category: PolicyViolation
  severity: High
  weight: 60
  confidence: Medium
  hard_trigger: false
  file_types:
  - .py
  - .js
  - .ts
  - .sh
  patterns:
  - '\[\s*0\s*\]\s*\*\s*10\s*\*\*\s*[6-9]'
  - 'malloc\s*\(\s*[\d_]{7,}'
  - 'bytearray\s*\(\s*[\d_]{7,}'
  - 'calloc\s*\(\s*[\d_]{7,}'
  exclude_patterns:
  - example
  - test
  description: 大量内存分配可能导致资源耗尽
  remediation: 使用有合理上限的内存分配
  cwe_id: CWE-400

  metadata:
    origin: cisco_parity
    source_ref: reference/skill_scanner/data/packs/core/python/large_allocation
    fp_risk: medium
    phase: P0
- id: TOOL_ABUSE_SYSTEM_MODIFICATION
  category: PolicyViolation
  severity: Critical
  weight: 85
  confidence: High
  hard_trigger: true
  file_types:
  - .sh
  - .bash
  - .py
  - .md
  patterns:
  - 'chmod\s+[0-7]*[2-7][0-7]*\s+/etc'
  - 'chmod\s+[0-7]*[2-7][0-7]*\s+/usr'
  - 'chmod\s+[0-7]*[2-7][0-7]*\s+/var'
  - 'chown\s+\w+\s+/(?:etc|usr|var)'
  - 'install\s+-m\s+[0-7]*[2-7][0-7]*\s+.*\s/(?:etc|usr)'
  exclude_patterns:
  - example
  - test
  description: 修改系统目录权限
  remediation: 不要在 skill 脚本中修改系统目录权限
  cwe_id: CWE-276

  metadata:
    origin: cisco_parity
    source_ref: reference/skill_scanner/data/packs/core/bash/system_modification
    fp_risk: low
    phase: P0
- id: OBFUSCATION_BASE64_LARGE
  category: Obfuscation
  severity: Medium
  weight: 35
  confidence: Medium
  hard_trigger: false
  patterns:
  - '[A-Za-z0-9+/]{200,}={0,2}'
  exclude_patterns:
  - example
  - test
  - mock
  description: 大型 Base64 编码数据块可能隐藏恶意内容
  remediation: 避免使用内联 Base64 数据，改用文件引用
  cwe_id: CWE-656

  metadata:
    origin: cisco_parity
    source_ref: reference/skill_scanner/data/packs/core/obfuscation/base64_blob
    fp_risk: medium
    phase: P0
