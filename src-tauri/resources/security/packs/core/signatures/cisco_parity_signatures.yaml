  category: SocialEngineering
  severity: Low
  weight: 15
  confidence: Low
  hard_trigger: false
  file_types:
  - .md
  patterns:
  - '(?i)\b(?:tool|utility|helper|assistant|service|agent)\b.*\b(?:tool|utility|helper|assistant|service|agent)\b'
  exclude_patterns:
  - example
  description: 描述使用了模糊的通用术语，缺乏具体说明
