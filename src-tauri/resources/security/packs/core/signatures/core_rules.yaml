# === core_rules.yaml — 产品默认安全基线 ===
#
# 定位：Agent Skills Guard 的主规则包，覆盖通用安全检测能力。
#
# 适合放入：
#   - 通用破坏性命令（删除根目录、清空用户目录、格式化磁盘等）
#   - 通用远程执行（curl | sh、反弹 shell、PowerShell IEX/EncodedCommand、LOLBin 执行）
#   - 通用代码执行 API（Python、Node.js、Java、Go、C#、PHP、Ruby 的动态执行/子进程调用）
#   - 通用凭据/敏感文件（私钥、API key、GitHub/AWS/JWT、.env、浏览器凭据、Windows SAM）
#   - Skill 内容安全（prompt injection、content poisoning、RAG poisoning、能力夸大、工具链滥用）
#
# 维护原则：
#   - 新增高召回规则前必须提供负例 fixture
#   - 低置信度规则优先使用 exclude_patterns 或 policy 控制
#   - 只有明确危险、安装时不能放行的规则才能设为 hard_trigger: true
#   - 新增规则须注明：放置理由、是否 hard trigger、是否需要 file_types/exclude_patterns、正负例 fixture
#
# 共享 exclude patterns 参考（当前按规则独立配置，调整时需同步更新所有相关规则）：
#   注释行排除: ^\s*#  (Python/Ruby/Shell 等使用，10 条规则共用)
#   双斜杠注释: ^\s*//  (JS/TS/C/Java 等使用，8 条规则共用)
#   块注释星号: ^\s*\*  (JS/TS 多行注释续行，2 条规则共用)
#   占位符排除: (?i)\b(placeholder|replace\s+with)\b  (PASSWORD 使用)
#   示例变量名: (?i)\b(your|my|the)_(secret|token|key)\b  (GENERIC_SECRET 使用)
#   示例标记:   (?i)\bexample\b  (SUDO 使用)
#

name: core
version: '1.0'
description: Core security rules migrated from Rust hardcoded rules
rules:
- id: RM_RF_ROOT
  category: Destructive
  severity: Critical
  weight: 100
  confidence: High
  hard_trigger: true
  patterns:
  - rm\s+(?:-[a-zA-Z]*\s+)*(?:-[a-zA-Z]*[rR][a-zA-Z]*\s+(?:-[a-zA-Z]*\s+)*/(?:$|\s|;|\|)|/\s+(?:-[a-zA-Z]*\s+)*-[a-zA-Z]*[rR][a-zA-Z]*(?:\s|;|\||$))
  description: rm -rf / 删除根目录
  remediation: 检查命令参数，避免操作根目录或使用通配符
  cwe_id: CWE-78
  metadata:
    origin: core
    fp_risk: low
    phase: P0
- id: DD_WIPE
  category: Destructive
