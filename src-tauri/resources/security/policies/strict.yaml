policy_name: strict
policy_version: "1.0"
preset_base: strict

disabled_rules:
  - DATA_EXFIL_JS_NETWORK
  - GLOB_HIDDEN_FILE_TARGETING
  - RESOURCE_ABUSE_INFINITE_LOOP

severity_overrides: []

hard_trigger_overrides: []

# Strict 模式：结构合规也计入安全分
score_kinds:
  - Security
  - Auditability
  - Structure

# 启用严格结构校验
strict_structure_enabled: true

# 启用归档深度扫描
archive_deep_scan_enabled: true

file_limits:
  max_files: 500
  max_depth: 12
  max_scan_file_size_bytes: 1048576

file_classification:
  inert_extensions:
    - ".png"
    - ".jpg"
    - ".jpeg"
    - ".gif"
    - ".webp"
    - ".ico"

rule_scoping:
  # strict 策略仅将真正的文档目录视为文档路径
  doc_path_indicators:
    - "doc"
    - "docs"
  # strict 策略不在文档路径中跳过任何规则
  skip_in_docs: []

pipeline:
  known_installer_domains:
    - "sh.rustup.rs"
    - "bun.sh"

credentials:
  known_test_values:
    - "sk_test_"
    - "example-token"

finding_output:
  dedupe: true

archive:
  max_depth: 2
  max_total_size_bytes: 52428800
  max_file_count: 200
  max_compression_ratio: 50.0

strict_structure:
  allowed_extensions:
    - ".md"
    - ".py"
    - ".sh"
    - ".json"
    - ".yaml"
    - ".yml"
    - ".txt"
  allowed_subdirs:
    - "scripts"
    - "references"
    - "assets"

trigger:
  min_description_length: 20
  keyword_baiting_threshold: 6
